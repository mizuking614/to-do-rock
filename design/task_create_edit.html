<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>to do rock – タスク作成・編集</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0A0A14;display:flex;justify-content:center;padding:40px 20px;font-family:'Inter',sans-serif}
    .phone{width:375px;min-height:812px;background:#0F0F1C;border-radius:40px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06);position:relative}
    .status-bar{display:flex;justify-content:space-between;padding:14px 24px 0;font-size:12px;color:#fff;font-weight:600}
    .header{padding:14px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06)}
    .header-title{font-size:17px;font-weight:700;color:#F1F5F9}
    .cancel-btn{font-size:14px;font-weight:600;color:#A78BFA}
    .save-btn{font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#7C3AED,#4F46E5);padding:8px 18px;border-radius:99px}
    .form{padding:20px 24px;display:flex;flex-direction:column;gap:18px}
    .form-label{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
    .form-input{background:#16162A;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;font-size:15px;color:#E2E8F0;font-family:'Inter',sans-serif;width:100%}
    .form-input.focused{border-color:#7C3AED}
    /* Category selector */
    .cat-group{display:flex;gap:8px}
    .cat-btn{flex:1;padding:14px 6px;border-radius:14px;border:1.5px solid rgba(255,255,255,.1);background:#16162A;text-align:center;cursor:pointer}
    .cat-icon{font-size:22px;display:block;margin-bottom:5px}
    .cat-label{font-size:11px;font-weight:700;color:#64748B}
    .cat-desc{font-size:9px;color:#475569;margin-top:2px}
    .cat-btn.selected-rock{border-color:rgba(139,92,246,.6);background:rgba(139,92,246,.12)}
    .cat-btn.selected-rock .cat-label{color:#A78BFA}
    .cat-btn.selected-pebble{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.08)}
    .cat-btn.selected-pebble .cat-label{color:#FCD34D}
    /* Rock hint */
    .rock-hint{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#A5B4FC}
    /* Toggle row */
    .toggle-row{display:flex;justify-content:space-between;align-items:center;background:#16162A;border-radius:14px;padding:14px 16px;border:1px solid rgba(255,255,255,.06)}
    .toggle-info{display:flex;flex-direction:column;gap:2px}
    .toggle-title{font-size:15px;font-weight:600;color:#E2E8F0}
    .toggle-sub{font-size:11px;color:#64748B}
    .toggle{width:44px;height:26px;background:#7C3AED;border-radius:99px;position:relative;flex-shrink:0}
    .toggle::after{content:'';width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;right:3px}
    .toggle.off{background:#334155}
    .toggle.off::after{right:auto;left:3px}
    .date-preview{background:#1E1B4B;border:1px solid rgba(139,92,246,.3);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:8px;margin-top:-8px}
    .date-text{font-size:14px;color:#A5B4FC;font-weight:500}
    /* Subtasks */
    .subtask-item{display:flex;align-items:center;gap:10px;background:#16162A;border-radius:12px;padding:10px 14px;border:1px solid rgba(255,255,255,.06);margin-bottom:8px}
    .sub-check{width:18px;height:18px;border-radius:5px;border:2px solid #334155;flex-shrink:0}
    .sub-text{font-size:14px;color:#94A3B8;flex:1}
    .sub-del{font-size:13px;color:#475569}
    .add-sub-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;border:1.5px dashed rgba(255,255,255,.1);border-radius:12px}
    .add-sub-btn span{font-size:13px;color:#64748B;font-weight:500}
    .delete-btn{margin:4px 24px 32px;padding:14px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:14px;text-align:center;font-size:14px;font-weight:600;color:#F87171}
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>●●●</span></div>
  <div class="header">
    <span class="cancel-btn">キャンセル</span>
    <span class="header-title">新しいタスク</span>
    <span class="save-btn">保存</span>
  </div>
  <div class="form">
    <!-- Category -->
    <div>
      <div class="form-label">カテゴリ</div>
      <div class="cat-group">
        <div class="cat-btn selected-rock">
          <span class="cat-icon">🔒</span>
          <span class="cat-label">Rock</span>
          <span class="cat-desc">順番必須</span>
        </div>
        <div class="cat-btn">
          <span class="cat-icon">🪨</span>
          <span class="cat-label" style="color:#64748B">Pebble</span>
          <span class="cat-desc" style="color:#334155">自由順</span>
        </div>
        <div class="cat-btn">
          <span class="cat-icon">🏖️</span>
          <span class="cat-label" style="color:#64748B">Sand</span>
          <span class="cat-desc" style="color:#334155">余裕あれば</span>
        </div>
      </div>
    </div>
    <!-- Rock hint -->
    <div class="rock-hint">
      🔒 Rockリストの末尾（#3）に追加されます
    </div>
    <!-- Title -->
    <div>
      <div class="form-label">タイトル</div>
      <input class="form-input focused" type="text" value="議事録をSlackに投稿する" />
    </div>
    <!-- Due date -->
    <div>
      <div class="form-label">期限</div>
      <div class="toggle-row">
        <div class="toggle-info">
          <span class="toggle-title">期限を設定</span>
          <span class="toggle-sub">カレンダーから選択</span>
        </div>
        <div class="toggle"></div>
      </div>
      <div class="date-preview"><span>📅</span><span class="date-text">2025年4月30日（水）</span></div>
    </div>
    <!-- Memo -->
    <div>
      <div class="form-label">メモ</div>
      <textarea class="form-input" style="height:80px;resize:none" placeholder="メモを追加（任意）"></textarea>
    </div>
    <!-- Subtasks -->
    <div>
      <div class="form-label">サブタスク</div>
      <div class="subtask-item">
        <div class="sub-check"></div>
        <span class="sub-text">議事録ドキュメントを作成</span>
        <span class="sub-del">✕</span>
      </div>
      <div class="add-sub-btn"><span>＋</span><span>サブタスクを追加</span></div>
    </div>
  </div>
  <div class="delete-btn">このタスクを削除</div>
</div>
</body>
</html>

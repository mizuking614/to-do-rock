<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>to do rock – 統計</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0A0A14;display:flex;justify-content:center;padding:40px 20px;font-family:'Inter',sans-serif}
    .phone{width:375px;min-height:812px;background:#0F0F1C;border-radius:40px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06);position:relative;padding-bottom:80px}
    .status-bar{display:flex;justify-content:space-between;padding:14px 24px 0;font-size:12px;color:#fff;font-weight:600}
    .header{padding:16px 24px 8px}
    .page-title{font-size:24px;font-weight:800;color:#F1F5F9;letter-spacing:-.3px;margin-bottom:12px}
    .period-tabs{display:flex;gap:6px;margin-bottom:4px}
    .period-tab{padding:7px 16px;border-radius:99px;font-size:12px;font-weight:600;color:#64748B;border:1px solid rgba(255,255,255,.1)}
    .period-tab.active{background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;border-color:transparent}
    .content{padding:0 24px;display:flex;flex-direction:column;gap:16px}
    /* Rock hero card */
    .rock-hero{background:linear-gradient(135deg,#1a1040,#2d1b69);border:1px solid rgba(139,92,246,.35);border-radius:20px;padding:18px 20px}
    .hero-label{font-size:11px;font-weight:700;color:#A5B4FC;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
    .hero-main{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .hero-text{font-size:14px;color:#C4B5FD;font-weight:500}
    .hero-num{font-size:28px;font-weight:800;color:#fff}
    .hero-bar{width:100%;height:8px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin-bottom:12px}
    .hero-fill{height:100%;width:40%;background:linear-gradient(90deg,#7C3AED,#60A5FA);border-radius:99px}
    .streak-row{display:flex;align-items:center;gap:8px}
    .streak-val{font-size:22px;font-weight:800;color:#A78BFA}
    .streak-label{font-size:12px;color:#94A3B8}
    /* Category cards */
    .cat-cards{display:flex;gap:8px}
    .cat-card{flex:1;background:#16162A;border-radius:16px;padding:14px 10px;text-align:center;border:1px solid rgba(255,255,255,.06)}
    .cat-card-icon{font-size:18px;display:block;margin-bottom:4px}
    .cat-card-val{font-size:20px;font-weight:800;color:#fff;display:block}
    .cat-card-label{font-size:10px;color:#64748B;margin-top:2px;display:block}
    /* Bar chart */
    .chart-card{background:#16162A;border-radius:18px;padding:16px;border:1px solid rgba(255,255,255,.06)}
    .chart-title{font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
    .bar-chart{display:flex;align-items:flex-end;justify-content:space-between;height:72px;gap:6px}
    .bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
    .bar{width:100%;border-radius:6px 6px 0 0;background:rgba(124,58,237,.25);min-height:4px}
    .bar.hl{background:linear-gradient(180deg,#A78BFA,#7C3AED)}
    .bar.empty{background:#1A1A2E}
    .bar-day{font-size:10px;color:#475569;font-weight:500}
    .bar-num{font-size:10px;color:#94A3B8;font-weight:600}
    /* Advice */
    .advice{background:linear-gradient(135deg,#1a1040,#2d1b69);border:1px solid rgba(139,92,246,.25);border-radius:16px;padding:14px 16px;font-size:13px;color:#A5B4FC;line-height:1.6}
    /* Bottom nav */
    .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:80px;background:rgba(15,15,28,.95);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-around;align-items:center;padding:0 16px 16px}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px}
    .nav-icon{font-size:22px}
    .nav-label{font-size:10px;color:#475569;font-weight:500}
    .nav-item.active .nav-label{color:#A78BFA}
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>●●●</span></div>
  <div class="header">
    <div class="page-title">📊 統計</div>
    <div class="period-tabs">
      <div class="period-tab active">今週</div>
      <div class="period-tab">今月</div>
      <div class="period-tab">全期間</div>
    </div>
  </div>
  <div class="content">
    <!-- Rock hero -->
    <div class="rock-hero">
      <div class="hero-label">🔒 Rock 攻略状況</div>
      <div class="hero-main">
        <span class="hero-text">今週の攻略済みRock</span>
        <span class="hero-num">#2 / 5</span>
      </div>
      <div class="hero-bar"><div class="hero-fill"></div></div>
      <div class="streak-row">
        <span class="streak-val">🔥 5日</span>
        <span class="streak-label">連続Rockクリア中！</span>
      </div>
    </div>
    <!-- Category cards -->
    <div class="cat-cards">
      <div class="cat-card">
        <span class="cat-card-icon">🔒</span>
        <span class="cat-card-val">2 / 5</span>
        <span class="cat-card-label">Rock完了</span>
      </div>
      <div class="cat-card">
        <span class="cat-card-icon">🪨</span>
        <span class="cat-card-val">4 / 6</span>
        <span class="cat-card-label">Pebble完了</span>
      </div>
      <div class="cat-card">
        <span class="cat-card-icon">🏖️</span>
        <span class="cat-card-val">1 / 3</span>
        <span class="cat-card-label">Sand完了</span>
      </div>
    </div>
    <!-- Bar chart -->
    <div class="chart-card">
      <div class="chart-title">曜日別 Rock クリア数</div>
      <div class="bar-chart">
        <div class="bar-col"><span class="bar-num">1</span><div class="bar" style="height:30px"></div><span class="bar-day">月</span></div>
        <div class="bar-col"><span class="bar-num">1</span><div class="bar" style="height:30px"></div><span class="bar-day">火</span></div>
        <div class="bar-col"><span class="bar-num">0</span><div class="bar empty" style="height:6px"></div><span class="bar-day">水</span></div>
        <div class="bar-col"><span class="bar-num">2</span><div class="bar hl" style="height:60px"></div><span class="bar-day">木</span></div>
        <div class="bar-col"><span class="bar-num">1</span><div class="bar" style="height:30px"></div><span class="bar-day">金</span></div>
        <div class="bar-col"><span class="bar-num">0</span><div class="bar empty" style="height:6px"></div><span class="bar-day">土</span></div>
        <div class="bar-col"><span class="bar-num">0</span><div class="bar empty" style="height:6px"></div><span class="bar-day">日</span></div>
      </div>
    </div>
    <!-- Advice -->
    <div class="advice">💡 Rockを毎日コツコツ攻略できています！水曜日はRockが止まっていたので、明日は挽回を狙いましょう。</div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">ホーム</div></div>
    <div class="nav-item"><div class="nav-icon">📅</div><div class="nav-label">カレンダー</div></div>
    <div class="nav-item active"><div class="nav-icon">📊</div><div class="nav-label" style="color:#A78BFA">統計</div></div>
  </div>
</div>
</body>
</html>

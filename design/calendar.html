<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>to do rock – カレンダー</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0A0A14;display:flex;justify-content:center;padding:40px 20px;font-family:'Inter',sans-serif}
    .phone{width:375px;min-height:812px;background:#0F0F1C;border-radius:40px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06);position:relative;padding-bottom:80px}
    .status-bar{display:flex;justify-content:space-between;padding:14px 24px 0;font-size:12px;color:#fff;font-weight:600}
    .header{padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
    .month-nav{display:flex;align-items:center;gap:10px}
    .month-title{font-size:20px;font-weight:800;color:#F1F5F9}
    .nav-arrow{width:32px;height:32px;background:rgba(255,255,255,.07);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#A78BFA;border:1px solid rgba(255,255,255,.08)}
    .today-btn{font-size:12px;font-weight:600;color:#A78BFA;padding:6px 12px;border:1px solid rgba(167,139,250,.3);border-radius:99px}
    .calendar{padding:0 24px 12px}
    .weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:6px}
    .weekday{font-size:11px;color:#475569;font-weight:600;padding:4px 0}
    .weekday.sun{color:#F87171}.weekday.sat{color:#60A5FA}
    .days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .day{display:flex;flex-direction:column;align-items:center;padding:5px 2px;border-radius:10px;gap:3px}
    .day-num{font-size:13px;font-weight:600;color:#64748B;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px}
    .day.today .day-num{background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;font-weight:800}
    .day.selected .day-num{border:2px solid #A78BFA;color:#A78BFA}
    .day.other .day-num{color:#1E293B}
    .dots{display:flex;gap:2px;justify-content:center;min-height:6px}
    .dot{width:5px;height:5px;border-radius:50%}
    .dr{background:#A78BFA}.dp{background:#FCD34D}.ds{background:#34D399}.de{background:#EF4444}
    .legend{display:flex;gap:12px;padding:8px 24px 10px;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:5px}
    .legend-dot{width:7px;height:7px;border-radius:50%}
    .legend-label{font-size:10px;color:#64748B;font-weight:500}
    .divider{height:1px;background:rgba(255,255,255,.06);margin:0 24px 14px}
    .selected-header{padding:0 24px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .sel-label{font-size:15px;font-weight:700;color:#F1F5F9}
    .add-link{font-size:13px;color:#A78BFA;font-weight:600}
    .task-list{padding:0 24px;display:flex;flex-direction:column;gap:8px}
    .task-card{background:#16162A;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;border:1px solid rgba(255,255,255,.06)}
    .task-card.locked{opacity:.55}
    .t-left{width:4px;height:36px;border-radius:99px;flex-shrink:0}
    .rock-accent{background:#A78BFA}.pebble-accent{background:#FCD34D}.sand-accent{background:#34D399}
    .t-content{flex:1}
    .t-title{font-size:14px;font-weight:600;color:#E2E8F0;margin-bottom:3px}
    .t-title.locked-t{color:#475569}
    .t-meta{font-size:11px;color:#64748B;display:flex;align-items:center;gap:6px}
    .badge-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px}
    .rock-pill{background:rgba(139,92,246,.15);color:#A78BFA;border:1px solid rgba(139,92,246,.3)}
    .pebble-pill{background:rgba(245,158,11,.15);color:#FCD34D;border:1px solid rgba(245,158,11,.3)}
    .lock-ic{font-size:14px;color:#475569}
    .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:80px;background:rgba(15,15,28,.95);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-around;align-items:center;padding:0 16px 16px}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px}
    .nav-icon{font-size:22px}
    .nav-label{font-size:10px;color:#475569;font-weight:500}
    .nav-item.active .nav-label{color:#A78BFA}
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>●●●</span></div>
  <div class="header">
    <div class="month-nav">
      <div class="nav-arrow">‹</div>
      <div class="month-title">2025年 4月</div>
      <div class="nav-arrow">›</div>
    </div>
    <div class="today-btn">今日</div>
  </div>
  <div class="calendar">
    <div class="weekdays">
      <div class="weekday sun">日</div><div class="weekday">月</div><div class="weekday">火</div>
      <div class="weekday">水</div><div class="weekday">木</div><div class="weekday">金</div><div class="weekday sat">土</div>
    </div>
    <div class="days">
      <div class="day other"><div class="day-num">30</div><div class="dots"></div></div>
      <div class="day other"><div class="day-num">31</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">1</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">2</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">3</div><div class="dots"><div class="dot dr"></div></div></div>
      <div class="day"><div class="day-num">4</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">5</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">6</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">7</div><div class="dots"><div class="dot dp"></div></div></div>
      <div class="day"><div class="day-num">8</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">9</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">10</div><div class="dots"><div class="dot dr"></div><div class="dot dp"></div></div></div>
      <div class="day"><div class="day-num">11</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">12</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">13</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">14</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">15</div><div class="dots"><div class="dot ds"></div></div></div>
      <div class="day"><div class="day-num">16</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">17</div><div class="dots"><div class="dot de"></div></div></div>
      <div class="day"><div class="day-num">18</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">19</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">20</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">21</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">22</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">23</div><div class="dots"><div class="dot dp"></div></div></div>
      <div class="day"><div class="day-num">24</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">25</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">26</div><div class="dots"></div></div>
      <div class="day"><div class="day-num">27</div><div class="dots"></div></div>
      <div class="day today"><div class="day-num">28</div><div class="dots"><div class="dot dr"></div><div class="dot dp"></div></div></div>
      <div class="day"><div class="day-num">29</div><div class="dots"></div></div>
      <div class="day selected"><div class="day-num">30</div><div class="dots"><div class="dot dr"></div></div></div>
      <div class="day other"><div class="day-num">1</div><div class="dots"></div></div>
      <div class="day other"><div class="day-num">2</div><div class="dots"></div></div>
      <div class="day other"><div class="day-num">3</div><div class="dots"></div></div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dr"></div><span class="legend-label">🔒 Rock</span></div>
    <div class="legend-item"><div class="legend-dot dp"></div><span class="legend-label">🪨 Pebble</span></div>
    <div class="legend-item"><div class="legend-dot ds"></div><span class="legend-label">🏖️ Sand</span></div>
    <div class="legend-item"><div class="legend-dot de"></div><span class="legend-label">期限切れ</span></div>
  </div>
  <div class="divider"></div>
  <div class="selected-header">
    <span class="sel-label">4月30日（水）のタスク</span>
    <span class="add-link">＋ 追加</span>
  </div>
  <div class="task-list">
    <!-- Active Rock -->
    <div class="task-card">
      <div class="t-left rock-accent"></div>
      <div class="t-content">
        <div class="t-title">企画書の最終レビューを完了させる</div>
        <div class="t-meta"><span class="badge-pill rock-pill">🔒 Rock #2</span><span>▶ アクティブ</span></div>
      </div>
    </div>
    <!-- Locked Rock -->
    <div class="task-card locked">
      <div class="t-left rock-accent" style="background:#334155"></div>
      <div class="t-content">
        <div class="t-title locked-t">週次レポートを作成する</div>
        <div class="t-meta"><span class="badge-pill rock-pill">🔒 Rock #4</span></div>
      </div>
      <span class="lock-ic">🔒</span>
    </div>
    <!-- Pebble -->
    <div class="task-card">
      <div class="t-left pebble-accent"></div>
      <div class="t-content">
        <div class="t-title">Slackのメッセージに返信する</div>
        <div class="t-meta"><span class="badge-pill pebble-pill">🪨 Pebble</span></div>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item"><div class="nav-icon">🏠</div><div class="nav-label">ホーム</div></div>
    <div class="nav-item active"><div class="nav-icon">📅</div><div class="nav-label" style="color:#A78BFA">カレンダー</div></div>
    <div class="nav-item"><div class="nav-icon">📊</div><div class="nav-label">統計</div></div>
  </div>
</div>
</body>
</html>

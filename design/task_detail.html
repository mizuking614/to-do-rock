<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>to do rock – タスク詳細</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0A0A14;display:flex;justify-content:center;padding:40px 20px;font-family:'Inter',sans-serif}
    .phone{width:375px;min-height:812px;background:#0F0F1C;border-radius:40px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.06);position:relative;padding-bottom:100px}
    .status-bar{display:flex;justify-content:space-between;padding:14px 24px 0;font-size:12px;color:#fff;font-weight:600}
    .header{padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
    .back-btn{font-size:14px;font-weight:600;color:#A78BFA}
    .header-actions{display:flex;gap:8px}
    .action-btn{width:34px;height:34px;background:rgba(255,255,255,.07);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid rgba(255,255,255,.08)}
    .lock-banner{margin:0 24px 16px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px}
    .lock-banner-text{font-size:13px;color:#FCA5A5;line-height:1.5}
    .lock-banner-text strong{color:#F87171;font-weight:700}
    .content{padding:0 24px;display:flex;flex-direction:column;gap:18px}
    .title-area{display:flex;align-items:flex-start;gap:14px}
    .big-check{width:28px;height:28px;border-radius:9px;border:2.5px solid #1E293B;flex-shrink:0;margin-top:4px;background:rgba(255,255,255,.02)}
    .big-title{font-size:21px;font-weight:800;color:#475569;line-height:1.3}
    .meta-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .rock-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;background:rgba(139,92,246,.15);color:#A78BFA;border:1px solid rgba(139,92,246,.3)}
    .rock-num{font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;background:rgba(239,68,68,.1);color:#FCA5A5;border:1px solid rgba(239,68,68,.2)}
    .due-badge{font-size:11px;font-weight:600;padding:5px 12px;border-radius:99px;background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.25)}
    .created{font-size:11px;color:#475569}
    .divider{height:1px;background:rgba(255,255,255,.06)}
    .section-title{font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
    .sub-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .sub-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
    .sub-fill{height:100%;width:0%;background:linear-gradient(90deg,#7C3AED,#60A5FA);border-radius:99px}
    .sub-count{font-size:12px;color:#475569;font-weight:600}
    .subtask-item{display:flex;align-items:center;gap:12px;background:#16162A;border-radius:12px;padding:12px 14px;border:1px solid rgba(255,255,255,.04);margin-bottom:8px}
    .sub-check{width:20px;height:20px;border-radius:6px;border:2px solid #1E293B;flex-shrink:0;background:rgba(255,255,255,.02)}
    .sub-text{font-size:14px;color:#334155}
    .memo-box{background:#16162A;border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.06)}
    .memo-text{font-size:14px;color:#94A3B8;line-height:1.7}
    .complete-btn{position:absolute;bottom:24px;left:24px;right:24px;padding:16px;background:#1A1A2E;border-radius:18px;text-align:center;font-size:15px;font-weight:700;color:#334155;border:1px solid rgba(255,255,255,.05)}
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>●●●</span></div>
  <div class="header">
    <span class="back-btn">← ホーム</span>
    <div class="header-actions">
      <div class="action-btn">✏️</div>
      <div class="action-btn">⋯</div>
    </div>
  </div>
  <div class="lock-banner">
    <span style="font-size:20px">🔒</span>
    <span class="lock-banner-text"><strong>#2 のタスク</strong>を完了してから<br>このタスクに進めます</span>
  </div>
  <div class="content">
    <div class="title-area">
      <div class="big-check"></div>
      <div class="big-title">議事録をSlackに投稿する</div>
    </div>
    <div class="meta-row">
      <span class="rock-badge">🔒 Rock</span>
      <span class="rock-num">#3</span>
      <span class="due-badge">📅 2025年5月1日（木）</span>
      <span class="created">作成日: 4月26日</span>
    </div>
    <div class="divider"></div>
    <div>
      <div class="section-title">サブタスク</div>
      <div class="sub-progress-row">
        <div class="sub-bar"><div class="sub-fill"></div></div>
        <span class="sub-count">0 / 1</span>
      </div>
      <div class="subtask-item">
        <div class="sub-check"></div>
        <span class="sub-text">議事録ドキュメントを作成</span>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="section-title">メモ</div>
      <div class="memo-box">
        <p class="memo-text">木曜日のMTG後に送ること。添付ファイルも忘れずに。</p>
      </div>
    </div>
  </div>
  <div class="complete-btn">🔒 前のタスクを完了してください</div>
</div>
</body>
</html>

name: app
description: "to do rock - 優先順位をつけて進めていくTo Doアプリ"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Data models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Routing
  go_router: ^14.8.1
  # Local storage
  hive_flutter: ^1.1.0
  # Utilities
  uuid: ^4.5.3
  flutter_local_notifications: ^17.0.0
  timezone: 0.9.4
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Code generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  freezed: ^2.5.7
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter_native_splash:
  color: "#1a1040"
  image: "assets/icon.png"
  android_12:
    image: "assets/icon.png"
    icon_background_color: "#1a1040"

